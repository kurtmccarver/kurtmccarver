name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate profile SVG
        run: node scripts/update-profile.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: kurtmccarver

      - name: Commit updated profile
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update generated profile stats
          file_pattern: README.md profile.svg
